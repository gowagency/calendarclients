<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>
  <!-- Calendar body -->
  <rect x="5" y="9" width="22" height="18" rx="3" fill="none" stroke="white" stroke-width="2"/>
  <!-- Top bar / header fill -->
  <rect x="5" y="9" width="22" height="7" rx="3" fill="white"/>
  <rect x="5" y="13" width="22" height="3" fill="white"/>
  <!-- Hook pins -->
  <line x1="10" y1="6" x2="10" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="6" x2="22" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Date dots (3x2 grid) -->
  <circle cx="10" cy="21" r="1.3" fill="white"/>
  <circle cx="16" cy="21" r="1.3" fill="white"/>
  <circle cx="22" cy="21" r="1.3" fill="white"/>
  <circle cx="10" cy="25.5" r="1.3" fill="white"/>
  <circle cx="16" cy="25.5" r="1.3" fill="white"/>
</svg>
